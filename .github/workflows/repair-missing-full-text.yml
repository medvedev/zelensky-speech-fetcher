name: Repair missing full_text values

on:
  workflow_dispatch:

env:
  HF_HOME: "./.huggignface"

jobs:
  repair-missing-full-text:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.16"
          cache: "poetry"

      - name: Install dependencies and Playwright browser
        run: |
          poetry install
          poetry run playwright install --with-deps chromium

      - name: Authenticate to Hugging Face
        run: poetry run hf auth login --token ${{ secrets.HF_TOKEN }}

      - name: Repair missing full_text values
        run: poetry run python -m zelensky_speech_fetcher.tools.repair_missing_full_text

      - name: Upload debug artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repair-debug-output
          path: debug_output/
          if-no-files-found: ignore
          retention-days: 7
